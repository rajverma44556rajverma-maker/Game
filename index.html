<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JavaGoat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase v8 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff7ed; user-select: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 4px; }
        
        /* ⚠️ CRITICAL RULE: Single Page Visibility */
        .page { display: none !important; }
        .page.active { display: block !important; animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .gradient-text { background: linear-gradient(to right, #dc2626, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,237,213,0.5); }
        
        .wallet-card { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); position: relative; overflow: hidden; }
        .wallet-card::before { content: ''; position: absolute; top: -50px; right: -20px; width: 150px; height: 150px; background: rgba(251, 191, 36, 0.15); border-radius: 50%; }
        .wallet-card::after { content: ''; position: absolute; bottom: -30px; left: -30px; width: 100px; height: 100px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; }
        
        .btn-primary { background: linear-gradient(to right, #dc2626, #fbbf24); color: white; font-weight: 700; border-radius: 0.75rem; padding: 0.875rem 1rem; box-shadow: 0 4px 14px 0 rgba(220, 38, 38, 0.39); transition: all 0.2s ease; }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 8px 0 rgba(220, 38, 38, 0.3); }
        
        .input-field { width: 100%; padding: 0.875rem 1rem; background: #fff; border: 1.5px solid #ffedd5; border-radius: 0.75rem; outline: none; transition: all 0.2s ease; color: #1f2937; }
        .input-field:focus { border-color: #f87171; box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.15); }

        .game-img-wrapper { overflow: hidden; border-radius: 0.75rem; }
        .game-img { transition: transform 0.4s ease; }
        .game-card:active .game-img { transform: scale(1.08); }
    </style>
</head>
<body class="text-gray-800 antialiased pb-24 relative min-h-screen">

    <!-- Global Loader -->
    <div id="global-loader" style="position:fixed; inset:0; z-index:9999; background:#fff7ed; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div class="w-16 h-16 border-4 border-red-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <h1 class="text-xl font-black gradient-text tracking-wider animate-pulse">JavaGoat</h1>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl text-white font-bold transition-all duration-300 opacity-0 pointer-events-none text-sm whitespace-nowrap z-[10000]"></div>

    <div id="app-container" class="max-w-md mx-auto min-h-screen bg-orange-50/30 relative shadow-2xl">
        
        <header id="app-header" class="flex justify-between items-center px-5 py-4 glass-header sticky top-0 z-50" style="display:none;">
            <h1 class="text-2xl font-black gradient-text tracking-tight"><i class="fas fa-gamepad mr-2 text-red-600"></i>JavaGoat</h1>
            <div onclick="navigateTo('walletPage')" class="flex items-center space-x-2 bg-orange-100/80 px-4 py-1.5 rounded-full text-red-600 font-bold border border-red-200 cursor-pointer active:scale-95 transition-transform shadow-sm">
                <i class="fas fa-wallet text-sm"></i>
                <span id="header-wallet-balance" class="text-sm">₹0</span>
            </div>
        </header>

        <main class="p-5">
            <div id="loginPage" class="page"></div>
            <div id="homePage" class="page"></div>
            <div id="myTournamentsPage" class="page"></div>
            <div id="walletPage" class="page"></div>
            <div id="profilePage" class="page"></div>
        </main>

        <nav id="user-bottom-nav" class="fixed bottom-0 w-full max-w-md bg-gradient-to-r from-red-600 to-yellow-500 rounded-t-3xl shadow-[0_-10px_20px_rgba(220,38,38,0.15)] z-50" style="display:none;">
            <div class="flex justify-around items-center px-2 py-3">
                <button onclick="navigateTo('homePage')" class="user-nav-item text-white/70 transition-all duration-300 flex flex-col items-center w-16">
                    <div class="nav-icon-bg p-2 rounded-xl mb-1"><i class="fas fa-home text-xl"></i></div><span class="text-[10px] font-semibold">Home</span>
                </button>
                <button onclick="navigateTo('myTournamentsPage')" class="user-nav-item text-white/70 transition-all duration-300 flex flex-col items-center w-16">
                    <div class="nav-icon-bg p-2 rounded-xl mb-1"><i class="fas fa-trophy text-xl"></i></div><span class="text-[10px] font-semibold">Matches</span>
                </button>
                <button onclick="navigateTo('walletPage')" class="user-nav-item text-white/70 transition-all duration-300 flex flex-col items-center w-16">
                    <div class="nav-icon-bg p-2 rounded-xl mb-1"><i class="fas fa-wallet text-xl"></i></div><span class="text-[10px] font-semibold">Wallet</span>
                </button>
                <button onclick="navigateTo('profilePage')" class="user-nav-item text-white/70 transition-all duration-300 flex flex-col items-center w-16">
                    <div class="nav-icon-bg p-2 rounded-xl mb-1"><i class="fas fa-user text-xl"></i></div><span class="text-[10px] font-semibold">Profile</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        const firebaseConfig = {
  apiKey: "AIzaSyDovutR_ek-JK3qebkgwt5kAOrrCbOrr9Y",
  authDomain: "tournament-879a2.firebaseapp.com",
  databaseURL: "https://tournament-879a2-default-rtdb.firebaseio.com",
  projectId: "tournament-879a2",
  storageBucket: "tournament-879a2.firebasestorage.app",
  messagingSenderId: "957678990890",
  appId: "1:957678990890:web:96bf23dffe2d684fb2f553"
};

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUserData = null;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl text-white font-bold transition-all duration-300 z-[10000] text-sm ${isError ? 'bg-red-600' : 'bg-gray-800'}`;
            toast.style.opacity = '1';
            toast.style.top = '20px';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.top = '10px'; }, 3000);
        }

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId)?.classList.add('active');
            loadPageContent(pageId);
            updateNavHighlight(pageId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateNavHighlight(pageId) {
            document.querySelectorAll('.user-nav-item').forEach(item => {
                const isActive = item.getAttribute('onclick').includes(pageId);
                const iconBg = item.querySelector('.nav-icon-bg');
                if (isActive) {
                    item.className = 'user-nav-item text-white flex flex-col items-center w-16 scale-110 -translate-y-2 transition-all duration-300 drop-shadow-md';
                    iconBg.classList.add('bg-white/20', 'backdrop-blur-sm');
                } else {
                    item.className = 'user-nav-item text-white/60 flex flex-col items-center w-16 transition-all duration-300 hover:text-white/80';
                    iconBg.classList.remove('bg-white/20', 'backdrop-blur-sm');
                }
            });
        }

        auth.onAuthStateChanged(async user => {
            document.getElementById('global-loader').style.display = 'none';
            const header = document.getElementById('app-header');
            const nav = document.getElementById('user-bottom-nav');

            if (user) {
                header.style.display = 'flex';
                nav.style.display = 'block';

                const activeTourney = localStorage.getItem('active_tournament_id');
                const pendingGame = localStorage.getItem('game_played_pending');
                if (activeTourney || pendingGame) {
                    localStorage.removeItem('active_tournament_id');
                    localStorage.removeItem('game_start_time');
                    localStorage.removeItem('game_played_pending');
                    showToast("Game recorded successfully!");
                }

                db.ref('users/' + user.uid).on('value', snap => {
                    currentUserData = { uid: user.uid, ...snap.val() };
                    document.getElementById('header-wallet-balance').textContent = `₹${currentUserData.wallet_balance || 0}`;
                    if(document.getElementById('walletPage').classList.contains('active')) loadPageContent('walletPage');
                });
                navigateTo('homePage');
            } else {
                currentUserData = null;
                header.style.display = 'none';
                nav.style.display = 'none';
                navigateTo('loginPage');
            }
        });

        function playGameUrl(url, tournamentId = null) {
            if (tournamentId) {
                localStorage.setItem('active_tournament_id', tournamentId);
                localStorage.setItem('game_start_time', Date.now());
            } else {
                localStorage.setItem('game_played_pending', 'true');
            }
            window.location.href = url;
        }

        function loadPageContent(pageId) {
            const container = document.getElementById(pageId);
            if (pageId === 'loginPage') renderLoginPage(container);
            else if (pageId === 'homePage') renderHomePage(container);
            else if (pageId === 'myTournamentsPage') renderMyTournamentsPage(container);
            else if (pageId === 'walletPage') renderWalletPage(container);
            else if (pageId === 'profilePage') renderProfilePage(container);
        }

        function renderLoginPage(container) {
            container.innerHTML = `
                <div class="mt-16 mb-10 text-center">
                    <div class="w-24 h-24 mx-auto bg-gradient-to-tr from-red-600 to-yellow-500 rounded-3xl shadow-lg flex items-center justify-center mb-6 transform rotate-3">
                        <i class="fas fa-gamepad fa-3x text-white -rotate-3"></i>
                    </div>
                    <h2 class="text-4xl font-black gradient-text tracking-tight">JavaGoat</h2>
                    <p class="text-sm text-gray-500 mt-2 font-medium">Play, Compete & Win Real Rewards!</p>
                </div>
                <div class="bg-white rounded-3xl p-6 shadow-xl shadow-orange-100 border border-white">
                    <div class="flex bg-orange-50 rounded-xl p-1 mb-6 relative">
                        <div id="tab-slider" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-lg shadow-sm transition-all duration-300 left-1"></div>
                        <button id="tab-login" class="w-1/2 py-2.5 font-bold text-red-600 z-10 transition-colors" onclick="toggleAuthTab('login')">Login</button>
                        <button id="tab-signup" class="w-1/2 py-2.5 font-bold text-gray-500 z-10 transition-colors" onclick="toggleAuthTab('signup')">Sign Up</button>
                    </div>
                    
                    <form id="authForm" class="flex flex-col gap-4">
                        <div id="username-container" style="display:none;">
                            <input type="text" id="username" placeholder="Username" class="input-field">
                        </div>
                        <input type="email" id="email" placeholder="Email Address" required class="input-field">
                        <input type="password" id="password" placeholder="Password" required class="input-field">
                        <button type="submit" class="btn-primary mt-4 flex justify-center items-center h-12" id="authBtn">Login</button>
                    </form>
                </div>
            `;

            let isLogin = true;
            window.toggleAuthTab = (tab) => {
                isLogin = tab === 'login';
                document.getElementById('tab-slider').style.left = isLogin ? '4px' : 'calc(50%)';
                document.getElementById('tab-login').className = `w-1/2 py-2.5 font-bold z-10 transition-colors ${isLogin ? 'text-red-600' : 'text-gray-500'}`;
                document.getElementById('tab-signup').className = `w-1/2 py-2.5 font-bold z-10 transition-colors ${!isLogin ? 'text-red-600' : 'text-gray-500'}`;
                document.getElementById('username-container').style.display = isLogin ? 'none' : 'block';
                document.getElementById('username').required = !isLogin;
                document.getElementById('authBtn').textContent = isLogin ? 'Login' : 'Create Account';
            };

            document.getElementById('authForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const btn = document.getElementById('authBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

                if (isLogin) {
                    auth.signInWithEmailAndPassword(email, password).catch(err => {
                        showToast(err.message, true);
                        btn.disabled = false; btn.textContent = 'Login';
                    });
                } else {
                    const username = document.getElementById('username').value;
                    auth.createUserWithEmailAndPassword(email, password).then((cred) => {
                        return db.ref('users/' + cred.user.uid).set({
                            username: username,
                            email: email,
                            wallet_balance: 0,
                            created_at: Date.now()
                        });
                    }).catch(err => {
                        showToast(err.message, true);
                        btn.disabled = false; btn.textContent = 'Create Account';
                    });
                }
            });
        }

        async function renderHomePage(container) {
            const firstName = currentUserData?.username ? currentUserData.username.split(' ')[0] : 'Player';
            
            container.innerHTML = `
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-gray-800">Hello, <span class="text-red-600">${firstName}</span> 👋</h2>
                    <p class="text-sm text-gray-500">Ready to win today?</p>
                </div>
                
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-gray-800">Quick Play</h3>
                </div>
                <div id="games-grid" class="grid grid-cols-2 gap-4 mb-8"></div>
                
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-gray-800">Upcoming Clashes</h3>
                </div>
                <div id="tournaments-list" class="flex flex-col gap-4"></div>
            `;
            
            db.ref('games').once('value', snap => {
                const grid = document.getElementById('games-grid');
                grid.innerHTML = '';
                if(snap.exists()) {
                    snap.forEach(child => {
                        const g = child.val();
                        grid.innerHTML += `
                            <div class="game-card relative bg-white rounded-2xl shadow-sm border border-orange-100 cursor-pointer overflow-hidden group" onclick="playGameUrl('${g.game_url}')">
                                <div class="game-img-wrapper aspect-[4/3]">
                                    <img src="${g.image_url}" class="game-img w-full h-full object-cover">
                                </div>
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                                <div class="absolute bottom-3 left-3 right-3 flex justify-between items-end">
                                    <h4 class="font-bold text-white text-sm truncate pr-2 leading-tight">${g.title}</h4>
                                    <div class="w-6 h-6 rounded-full bg-red-600 text-white flex items-center justify-center shadow-lg"><i class="fas fa-play text-[10px] ml-0.5"></i></div>
                                </div>
                            </div>`;
                    });
                } else grid.innerHTML = `<div class="col-span-2 text-center py-6 text-gray-400 bg-white rounded-xl border border-dashed border-gray-200"><i class="fas fa-ghost fa-2x mb-2"></i><p class="text-sm">No games available.</p></div>`;
            });

            db.ref('tournaments').orderByChild('status').equalTo('Upcoming').once('value', snap => {
                const list = document.getElementById('tournaments-list');
                list.innerHTML = '';
                if(snap.exists()) {
                    snap.forEach(child => {
                        const t = child.val();
                        list.innerHTML += `
                            <div class="bg-white rounded-2xl p-5 shadow-sm border border-orange-100">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <h4 class="font-bold text-lg text-gray-800 leading-tight">${t.title}</h4>
                                        <p class="text-xs text-red-500 font-semibold mt-1"><i class="fas fa-gamepad mr-1"></i> ${t.game_name}</p>
                                    </div>
                                    <span class="bg-red-50 text-red-600 border border-red-100 text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wide">Upcoming</span>
                                </div>
                                
                                <div class="border-t border-dashed border-gray-200 my-3"></div>
                                
                                <div class="flex justify-between items-center mb-4">
                                    <div>
                                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Entry Fee</p>
                                        <p class="font-bold text-gray-800">₹${t.entry_fee}</p>
                                    </div>
                                    <div class="h-8 w-px bg-gray-200"></div>
                                    <div class="text-center">
                                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Time</p>
                                        <p class="font-bold text-gray-800">${new Date(t.match_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                    </div>
                                    <div class="h-8 w-px bg-gray-200"></div>
                                    <div class="text-right">
                                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Prize Pool</p>
                                        <p class="font-bold text-green-600">₹${t.prize_pool}</p>
                                    </div>
                                </div>
                                <button class="btn-primary w-full text-sm py-2.5" onclick="joinTournament('${child.key}', ${t.entry_fee})">Join Match</button>
                            </div>`;
                    });
                } else list.innerHTML = `<div class="text-center py-8 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200"><i class="fas fa-calendar-times fa-2x mb-3"></i><p class="text-sm font-medium">No upcoming matches.</p></div>`;
            });
        }

        window.joinTournament = (tId, fee) => {
            if(currentUserData.wallet_balance < fee) {
                showToast("Insufficient balance! Add money to wallet.", true);
                navigateTo('walletPage');
                return;
            }
            db.ref(`participants/${tId}/${currentUserData.uid}`).once('value', snap => {
                if(snap.exists()) showToast("Already joined!", true);
                else {
                    const updates = {};
                    updates[`users/${currentUserData.uid}/wallet_balance`] = currentUserData.wallet_balance - fee;
                    updates[`participants/${tId}/${currentUserData.uid}`] = { status: "Participated", score: 0, gameResult: "" };
                    updates[`transactions/${currentUserData.uid}/${Date.now()}`] = { amount: fee, type: "debit", description: "Tournament Entry", created_at: Date.now() };
                    db.ref().update(updates).then(() => {
                        showToast("Successfully joined match!");
                        navigateTo('myTournamentsPage');
                    });
                }
            });
        };

        function renderMyTournamentsPage(container) {
            container.innerHTML = `
                <div class="flex bg-orange-50 rounded-xl p-1 mb-6 relative border border-orange-100">
                    <div id="match-tab-slider" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-lg shadow-sm transition-all duration-300 left-1"></div>
                    <button id="tab-live" class="w-1/2 py-2 font-bold text-red-600 z-10 text-sm transition-colors" onclick="toggleMatchesTab('Live')">Upcoming/Live</button>
                    <button id="tab-comp" class="w-1/2 py-2 font-bold text-gray-500 z-10 text-sm transition-colors" onclick="toggleMatchesTab('Completed')">Completed</button>
                </div>
                <div id="my-matches-list" class="flex flex-col gap-4"></div>
            `;
            
            let showCompleted = false;
            window.toggleMatchesTab = (tab) => {
                showCompleted = (tab === 'Completed');
                document.getElementById('match-tab-slider').style.left = showCompleted ? 'calc(50%)' : '4px';
                document.getElementById('tab-live').className = `w-1/2 py-2 font-bold z-10 text-sm transition-colors ${!showCompleted ? 'text-red-600' : 'text-gray-500'}`;
                document.getElementById('tab-comp').className = `w-1/2 py-2 font-bold z-10 text-sm transition-colors ${showCompleted ? 'text-red-600' : 'text-gray-500'}`;
                loadMyMatches(showCompleted);
            };
            loadMyMatches(false);
        }

        function loadMyMatches(isCompleted) {
            const list = document.getElementById('my-matches-list');
            list.innerHTML = `<div class="text-center py-10"><i class="fas fa-circle-notch fa-spin fa-2x text-red-500"></i></div>`;
            db.ref('participants').once('value', async snap => {
                let html = '';
                if(snap.exists()) {
                    const allParticipants = snap.val();
                    const joinedTourneyIds = Object.keys(allParticipants).filter(tId => allParticipants[tId][currentUserData.uid]);
                    
                    for(let tId of joinedTourneyIds) {
                        const tSnap = await db.ref(`tournaments/${tId}`).once('value');
                        if(tSnap.exists()) {
                            const t = tSnap.val();
                            const isMatchCompleted = (t.status === 'Completed');
                            if((isCompleted && isMatchCompleted) || (!isCompleted && !isMatchCompleted)) {
                                html += `
                                <div class="bg-white rounded-2xl p-5 shadow-sm border border-orange-100">
                                    <div class="flex justify-between items-start mb-3">
                                        <h4 class="font-bold text-gray-800">${t.title}</h4>
                                        <span class="text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wide border ${t.status === 'Live' ? 'bg-green-50 text-green-600 border-green-100' : (t.status === 'Completed' ? 'bg-gray-50 text-gray-600 border-gray-200' : 'bg-orange-50 text-orange-600 border-orange-100')}">${t.status}</span>
                                    </div>
                                    ${t.status === 'Live' ? 
                                    `<div class="bg-slate-50 p-3 rounded-xl mb-4 text-sm border border-slate-200">
                                        <div class="flex justify-between mb-1"><span class="text-gray-500">Room ID</span><span class="font-mono font-bold">${t.room_id || 'Waiting...'}</span></div>
                                        <div class="flex justify-between"><span class="text-gray-500">Password</span><span class="font-mono font-bold">${t.room_password || 'Waiting...'}</span></div>
                                    </div>
                                    <button class="btn-primary w-full py-2.5 text-sm flex justify-center items-center" onclick="playGameUrl('${t.game_url}', '${tId}')"><i class="fas fa-play mr-2 text-xs"></i> Play Now</button>` 
                                    : `<div class="flex items-center text-sm text-gray-500"><i class="far fa-clock mr-2"></i> ${new Date(t.match_time).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</div>`}
                                </div>`;
                            }
                        }
                    }
                }
                list.innerHTML = html || `<div class="text-center py-8 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200"><i class="fas fa-folder-open fa-2x mb-3"></i><p class="text-sm font-medium">No matches found.</p></div>`;
            });
        }

        function renderWalletPage(container) {
            container.innerHTML = `
                <div class="wallet-card rounded-3xl p-6 text-white shadow-xl shadow-red-500/20 mb-8">
                    <div class="flex justify-between items-center mb-6 relative z-10">
                        <span class="text-white/80 text-sm font-semibold tracking-wider uppercase">Available Balance</span>
                        <i class="fas fa-sim-card text-2xl text-yellow-400 opacity-80 transform rotate-90"></i>
                    </div>
                    <h2 class="text-4xl font-black mb-6 tracking-tight relative z-10">₹${currentUserData?.wallet_balance || 0}</h2>
                    <div class="flex gap-3 relative z-10">
                        <button class="flex-1 bg-white text-red-600 py-3 rounded-xl font-bold shadow-md active:scale-95 transition-transform flex items-center justify-center" onclick="promptAddMoney()"><i class="fas fa-plus-circle mr-2"></i> Add</button>
                        <button class="flex-1 bg-black/20 text-white backdrop-blur-sm border border-white/20 py-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center" onclick="showToast('Withdrawals temporarily disabled.', true)"><i class="fas fa-university mr-2"></i> Withdraw</button>
                    </div>
                </div>
                
                <h3 class="text-lg font-bold mb-4 text-gray-800">Transaction History</h3>
                <div id="txn-list" class="flex flex-col gap-3"></div>
            `;
            
            db.ref(`transactions/${currentUserData.uid}`).orderByChild('created_at').limitToLast(10).on('value', snap => {
                const list = document.getElementById('txn-list');
                list.innerHTML = '';
                if(snap.exists()) {
                    const txns =[];
                    snap.forEach(c => { txns.unshift(c.val()); });
                    txns.forEach(txn => {
                        const isCr = txn.type === 'credit';
                        list.innerHTML += `
                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-orange-100 flex justify-between items-center">
                                <div class="flex items-center gap-4">
                                    <div class="${isCr ? 'bg-green-50 text-green-500' : 'bg-red-50 text-red-500'} w-12 h-12 rounded-full flex items-center justify-center text-lg shadow-inner">
                                        <i class="fas ${isCr ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-800 text-sm">${txn.description}</p>
                                        <p class="text-xs text-gray-400 mt-0.5">${new Date(txn.created_at).toLocaleDateString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</p>
                                    </div>
                                </div>
                                <span class="font-bold text-lg ${isCr ? 'text-green-500' : 'text-gray-800'}">${isCr ? '+' : '-'}₹${txn.amount}</span>
                            </div>`;
                    });
                } else list.innerHTML = `<div class="text-center py-6 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-200"><i class="fas fa-receipt fa-2x mb-2 text-gray-300"></i><p class="text-sm">No transactions yet.</p></div>`;
            });
        }

        window.promptAddMoney = () => {
            const amt = prompt("Enter amount to add:");
            if(amt && !isNaN(amt) && Number(amt) > 0) {
                const updates = {};
                updates[`users/${currentUserData.uid}/wallet_balance`] = (currentUserData.wallet_balance || 0) + Number(amt);
                updates[`transactions/${currentUserData.uid}/${Date.now()}`] = { amount: Number(amt), type: "credit", description: "Added to Wallet", created_at: Date.now() };
                db.ref().update(updates).then(() => showToast(`Added ₹${amt} successfully!`));
            }
        };

        function renderProfilePage(container) {
            container.innerHTML = `
                <div class="bg-white rounded-3xl p-6 text-center shadow-sm border border-orange-100 mb-6 relative overflow-hidden">
                    <div class="absolute top-0 left-0 right-0 h-20 bg-gradient-to-r from-red-600 to-yellow-500"></div>
                    <div class="w-24 h-24 mx-auto bg-white text-red-500 rounded-full flex items-center justify-center text-4xl shadow-md border-4 border-white outline outline-2 outline-orange-100 relative z-10 mt-4 mb-3">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                    <h2 class="text-2xl font-black text-gray-800 tracking-tight">${currentUserData?.username || 'User'}</h2>
                    <p class="text-gray-500 text-sm font-medium mt-1">${currentUserData?.email || ''}</p>
                </div>
                
                <div class="flex flex-col gap-3">
                    <button class="bg-white rounded-2xl p-4 flex justify-between items-center text-left active:scale-95 transition-transform shadow-sm border border-orange-100" onclick="auth.sendPasswordResetEmail('${currentUserData?.email}').then(()=>showToast('Reset email sent!'))">
                        <div class="flex items-center"><div class="w-10 h-10 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center mr-3"><i class="fas fa-key"></i></div><span class="font-bold text-gray-700">Reset Password</span></div>
                        <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
                    </button>
                    <button class="bg-white rounded-2xl p-4 flex justify-between items-center text-left active:scale-95 transition-transform shadow-sm border border-orange-100" onclick="auth.signOut()">
                        <div class="flex items-center"><div class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center mr-3"><i class="fas fa-sign-out-alt"></i></div><span class="font-bold text-red-600">Logout</span></div>
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
